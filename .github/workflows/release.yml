name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            formats: dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libvulkan-dev

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and package
        run: cargo packager --release --formats ${{ matrix.formats }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            target/release/*.dmg
            target/release/*-setup.exe
            target/release/*.AppImage
            target/release/*.deb
          if-no-files-found: error

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release_notes.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Bump Homebrew Cask
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Homebrew Cask
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: clutch
          formula-path: Casks/clutch.rb
          homebrew-tap: shitz/homebrew-clutch
          base-branch: main
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Clutch_${{ github.ref_name }}_aarch64.dmg
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
